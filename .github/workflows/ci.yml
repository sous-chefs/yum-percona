---
name: ci

"on":
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@8.0.1
    permissions:
      actions: write
      checks: write
      pull-requests: write
      statuses: write
      issues: write

  integration:
    needs: "lint-unit"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - almalinux-8
          - almalinux-9
          - amazonlinux-2023
          - centos-stream-9
          - oraclelinux-8
          - oraclelinux-9
          - rockylinux-8
          - rockylinux-9
        suite:
          - default
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - name: Install Chef
        uses: sous-chefs/.github/.github/actions/install-workstation@8.0.1
      - name: Test Kitchen
        run: kitchen test ${{ matrix.suite }}-${{ matrix.os }} --destroy=always
        env:
          CHEF_LICENSE: accept
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
      - name: Print debug output on failure
        if: failure()
        run: |
          set -x
          sudo journalctl -l --since today
          KITCHEN_LOCAL_YAML=kitchen.dokken.yml /usr/bin/kitchen exec ${{ matrix.suite }}-${{ matrix.os }} -c "journalctl -l"
